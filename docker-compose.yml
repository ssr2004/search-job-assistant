services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      # 代码挂载：修改代码后容器自动热更新
      - ./backend:/app
      # 数据持久化
      - backend_data:/app/data
    env_file:
      - ./backend/.env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

volumes:
  backend_data:
